<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - ZTS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>ZTS</h1>
            <h2>Multi-Factor Authentication</h2>

            <p style="font-size:0.85rem; color:#636e72; margin-bottom:16px;">
                Step 2: Enter the OTP code to verify your identity
            </p>

            <div class="otp-display">
                <p style="font-size:0.75rem; color:#636e72;">Your OTP Code (Demo Mode)</p>
                <p class="code" id="otpDisplay">------</p>
                <p class="note">In production, this code would be sent to your email or phone.</p>
            </div>

            <p id="riskInfo" style="font-size:0.82rem; margin-bottom:16px;"></p>

            <form id="otpForm">
                <div class="form-group">
                    <label for="otpInput">Enter OTP Code</label>
                    <input type="text" id="otpInput" name="code" maxlength="6" required
                        style="text-align:center; font-size:1.2rem; letter-spacing:4px;">
                </div>
                <button type="submit" class="btn btn-primary">Verify and Login</button>
            </form>

            <p id="errorMsg" class="error-msg" style="display:none;"></p>

            <a href="/login" style="font-size:0.8rem; color:#0984e3; display:block; margin-top:16px;">
                Back to Login
            </a>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // display the OTP code from login
        var otpCode = sessionStorage.getItem('otpCode') || '------';
        var riskScore = sessionStorage.getItem('riskScore') || '0';
        var riskLevel = sessionStorage.getItem('riskLevel') || 'Low';

        document.getElementById('otpDisplay').textContent = otpCode;

        var riskColor = riskLevel === 'Low' ? 'score-low' : riskLevel === 'Medium' ? 'score-medium' : 'score-high';
        document.getElementById('riskInfo').innerHTML = 'Risk: <span class="' + riskColor + '">' + riskLevel + ' (' + riskScore + '/100)</span>';

        document.getElementById('otpForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            var errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            var code = document.getElementById('otpInput').value.trim();

            try {
                var result = await postJSON('/verify-otp', { code: code });

                if (result.success) {
                    sessionStorage.removeItem('otpCode');
                    sessionStorage.removeItem('riskScore');
                    sessionStorage.removeItem('riskLevel');
                    window.location.href = result.redirect;
                } else {
                    errorEl.textContent = result.message;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
