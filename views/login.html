<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Zero Trust Security in Remote work </h1>
            <h2>Welcome to Zero Trust Security</h2>

            <form id="loginForm">
                <input type="hidden" id="fingerprint" name="fingerprint">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <p id="errorMsg" class="error-msg" style="display:none;"></p>
        </div>
    </div>

    <script src="/js/app.js?v=5"></script>
    <script>
        document.getElementById('fingerprint').value = getFingerprint();

        // Handle error messages from URL redirects
        var urlParams = new URLSearchParams(window.location.search);
        var msg = urlParams.get('msg');
        if (msg) {
            var errorEl = document.getElementById('errorMsg');
            if (msg === 'off_hours') {
                errorEl.innerHTML = '<strong>Access Denied:</strong> Remote work access restricted during off-hours (10:00 PM - 6:00 AM).';
            } else if (msg === 'session_invalid') {
                errorEl.innerHTML = '<strong>Session Invalidated:</strong> Safety mismatch detected.';
            } else if (msg === 'session_expired') {
                errorEl.style.display = 'none'; // handled by standard flow if any
            } else {
                errorEl.textContent = msg.replace(/_/g, ' ');
            }
            errorEl.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            var data = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                fingerprint: document.getElementById('fingerprint').value
            };

            try {
                var result = await postJSON('/login', data);

                if (result.success) {
                    sessionStorage.setItem('riskScore', result.risk.score);
                    sessionStorage.setItem('riskLevel', result.risk.level);
                    window.location.href = result.redirect;
                } else {
                    errorEl.textContent = result.message;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
