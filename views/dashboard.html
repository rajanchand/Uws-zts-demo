<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ZTS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <a href="/dashboard" class="navbar-brand"><span>ZTS</span> Zero Trust Security</a>
        <div class="nav-menu" id="mainNav"></div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <div class="container">
        <div class="card" style="padding:16px 20px;">
            <h2 id="dashTitle" style="font-size:1rem; margin-bottom:2px;"></h2>
            <p id="dashDescription" style="font-size:0.82rem; color:#636e72; margin:0;"></p>
        </div>

        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px;">
            <div class="card" style="text-align:center; padding:14px;">
                <div id="statRisk" style="font-size:1.4rem; font-weight:700;"></div>
                <div style="font-size:0.72rem; color:#636e72;">Risk</div>
            </div>
            <div class="card" style="text-align:center; padding:14px;">
                <div id="statSessions" style="font-size:1.4rem; font-weight:700;"></div>
                <div style="font-size:0.72rem; color:#636e72;">Sessions</div>
            </div>
            <div class="card" style="text-align:center; padding:14px;">
                <div id="statCountry" style="font-size:1.4rem; font-weight:700;"></div>
                <div style="font-size:0.72rem; color:#636e72;">Country</div>
            </div>
            <div class="card" style="text-align:center; padding:14px;">
                <div id="statDevice" style="font-size:1.4rem; font-weight:700;"></div>
                <div style="font-size:0.72rem; color:#636e72;">Device</div>
            </div>
        </div>

        <div class="card">
            <h3>Department Tools</h3>
            <div class="card-grid" id="featureCards"></div>
        </div>

        <div class="card">
            <h3>Recent Activity</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Action</th>
                            <th>Detail</th>
                            <th>IP</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="activityTable">
                        <tr>
                            <td colspan="4" style="text-align:center; color:#aaa;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>

        async function loadDashboard() {
            try {
                var res = await fetch('/api/dashboard-data');
                var d = await res.json();

                buildNavbar(d.user.role, 'dashboard', d.user.username);

                document.getElementById('dashTitle').textContent = d.dashboard.title;
                document.getElementById('dashDescription').textContent = d.dashboard.description;

                var sr = document.getElementById('statRisk');
                sr.textContent = d.security.riskScore;
                sr.className = d.security.riskLevel === 'Low' ? 'score-low' : d.security.riskLevel === 'Medium' ? 'score-medium' : 'score-high';
                document.getElementById('statSessions').textContent = d.security.sessionCount;
                document.getElementById('statCountry').textContent = (d.security.loginContext && d.security.loginContext.country) || '-';
                document.getElementById('statDevice').textContent = d.security.loginContext && d.security.loginContext.isNewDevice ? 'New' : 'Known';

                var fc = document.getElementById('featureCards');
                fc.innerHTML = '';
                (d.dashboard.cards || []).forEach(function (c) {
                    var el = document.createElement('div');
                    el.className = 'feature-card';
                    el.onclick = function () { if (c.link && c.link !== '#') location.href = c.link; };
                    el.innerHTML =
                        '<div class="card-icon">' + c.icon + '</div>' +
                        '<strong>' + c.title + '</strong>' +
                        '<p>' + c.description + '</p>';
                    fc.appendChild(el);
                });

                var ares = await fetch('/api/activity');
                var logs = await ares.json();
                var tb = document.getElementById('activityTable');
                if (!logs.length) {
                    tb.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#aaa;">No activity</td></tr>';
                    return;
                }
                tb.innerHTML = '';
                logs.slice(0, 8).forEach(function (l) {
                    var tr = document.createElement('tr');
                    tr.innerHTML = '<td>' + l.action + '</td><td>' + (l.detail || '-') + '</td><td>' + (l.ip || '-') + '</td><td>' + formatDate(l.created_at) + '</td>';
                    tb.appendChild(tr);
                });
            } catch (e) {
                location.href = '/login';
            }
        }

        loadDashboard();
    </script>
</body>

</html>
