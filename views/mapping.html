<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping - ZTS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <a href="/dashboard" class="navbar-brand"><span>ZTS</span> Zero Trust Security</a>
        <div class="nav-menu" id="mainNav"></div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <div class="container">
        <!-- User Management -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 style="margin:0;">Users</h3>
                <button class="btn btn-primary btn-sm" onclick="showCreateUser()">Create User</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Department</th>
                            <th>Status</th>
                            <th>Failed</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <tr>
                            <td colspan="7" style="text-align:center; color:#aaa;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Department Management -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h3 style="margin:0;">Departments</h3>
                <button class="btn btn-primary btn-sm" onclick="showCreateDept()">Create Department</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Created By</th>
                            <th>Department Head</th>
                            <th>Total Users</th>
                            <th>Created</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="deptsTable">
                        <tr>
                            <td colspan="7" style="text-align:center; color:#aaa;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Create User Modal -->
    <div id="createUserModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Create New User</h3>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="newUsername">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="newPassword">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="newEmail">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="newRole">
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                    <option value="IT">IT</option>
                    <option value="CustomerSupport">Customer Support</option>
                    <option value="SuperAdmin">SuperAdmin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="newDepartment"></select>
            </div>
            <p id="createUserError" class="error-msg" style="display:none;"></p>
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="createUser()">Create</button>
                <button class="btn btn-outline" onclick="hideModal('createUserModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Create Department Modal -->
    <div id="createDeptModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Create Department</h3>
            <div class="form-group">
                <label>Department Name</label>
                <input type="text" id="newDeptName">
            </div>
            <div class="form-group">
                <label>Department Head (optional)</label>
                <select id="newDeptHead">
                    <option value="">-- None --</option>
                </select>
            </div>
            <p id="createDeptError" class="error-msg" style="display:none;"></p>
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="createDept()">Create</button>
                <button class="btn btn-outline" onclick="hideModal('createDeptModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Set Department Head Modal -->
    <div id="setHeadModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Set Department Head</h3>
            <p id="setHeadDeptName" style="margin-bottom:12px;"></p>
            <input type="hidden" id="setHeadDeptId">
            <div class="form-group">
                <label>Select Head</label>
                <select id="setHeadSelect">
                    <option value="">-- None --</option>
                </select>
            </div>
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="setDeptHead()">Update</button>
                <button class="btn btn-outline" onclick="hideModal('setHeadModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Change Role Modal -->
    <div id="changeRoleModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Change Role</h3>
            <p id="changeRoleUser" style="margin-bottom:12px;"></p>
            <div class="form-group">
                <label>New Role</label>
                <select id="changeRoleSelect">
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                    <option value="IT">IT</option>
                    <option value="CustomerSupport">Customer Support</option>
                    <option value="SuperAdmin">SuperAdmin</option>
                </select>
            </div>
            <input type="hidden" id="changeRoleUserId">
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="changeRole()">Update</button>
                <button class="btn btn-outline" onclick="hideModal('changeRoleModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal -->
    <div id="resetPasswordModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Reset Password</h3>
            <p id="resetPasswordUser" style="margin-bottom:12px;"></p>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="resetNewPassword" placeholder="Enter new password (min 6 characters)">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="resetConfirmPassword" placeholder="Confirm new password">
            </div>
            <input type="hidden" id="resetPasswordUserId">
            <p id="resetPasswordError" class="error-msg" style="display:none;"></p>
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="resetPassword()">Reset Password</button>
                <button class="btn btn-outline" onclick="hideModal('resetPasswordModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h3>Edit User</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="editRole">
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                    <option value="IT">IT</option>
                    <option value="CustomerSupport">Customer Support</option>
                    <option value="SuperAdmin">SuperAdmin</option>
                </select>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="editDepartment"></select>
            </div>
            <p id="editUserError" class="error-msg" style="display:none;"></p>
            <div style="display:flex; gap:8px; margin-top:16px;">
                <button class="btn btn-primary" onclick="editUser()">Save Changes</button>
                <button class="btn btn-outline" onclick="hideModal('editUserModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        var allDepartments = [];

        async function init() {
            var s = await (await fetch('/api/session')).json();
            if (!s.loggedIn) return location.href = '/login';
            buildNavbar(s.user.role, 'mapping', s.user.username);
            loadUsers();
            loadDepartments();
        }

        async function loadUsers() {
            var users = await (await fetch('/api/mapping/users')).json();
            var tb = document.getElementById('usersTable');
            tb.innerHTML = '';

            users.forEach(function (u) {
                var statusClass = 'status-' + u.status;
                var tr = document.createElement('tr');
                var actions = '';

                actions += '<button class="btn btn-sm btn-primary" onclick="showEditUser(' + u.id + ')">Edit</button> ';
                if (u.status === 'active') {
                    actions += '<button class="btn btn-sm btn-warning" onclick="suspendUser(' + u.id + ')">Suspend</button> ';
                    actions += '<button class="btn btn-sm btn-danger" onclick="blockUser(' + u.id + ')">Block</button> ';
                } else {
                    actions += '<button class="btn btn-sm btn-success" onclick="activateUser(' + u.id + ')">Activate</button> ';
                }
                actions += '<button class="btn btn-sm btn-outline" onclick="showChangeRole(' + u.id + ',\'' + u.username + '\',\'' + u.role + '\')">Role</button> ';
                actions += '<button class="btn btn-sm btn-outline" onclick="showResetPassword(' + u.id + ',\'' + u.username + '\')">Password</button> ';
                actions += '<button class="btn btn-sm btn-danger" onclick="deleteUser(' + u.id + ',\'' + u.username + '\')">Delete</button>';

                tr.innerHTML =
                    '<td>' + u.id + '</td>' +
                    '<td><strong>' + u.username + '</strong></td>' +
                    '<td><span class="role-badge" style="font-size:0.7rem;">' + u.role + '</span></td>' +
                    '<td>' + (u.department || '-') + '</td>' +
                    '<td><span class="' + statusClass + '">' + u.status + '</span></td>' +
                    '<td>' + (u.failed_attempts || 0) + '</td>' +
                    '<td>' + actions + '</td>';
                tb.appendChild(tr);
            });
        }

        async function loadDepartments() {
            allDepartments = await (await fetch('/api/mapping/departments')).json();
            var tb = document.getElementById('deptsTable');
            tb.innerHTML = '';

            // update the department dropdown
            var select = document.getElementById('newDepartment');
            select.innerHTML = '';
            allDepartments.forEach(function (d) {
                var opt = document.createElement('option');
                opt.value = d.name;
                opt.textContent = d.name;
                select.appendChild(opt);

                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td>' + d.id + '</td>' +
                    '<td>' + d.name + '</td>' +
                    '<td>' + (d.created_by_name || '-') + '</td>' +
                    '<td>' + (d.head_name || '-') + '</td>' +
                    '<td><span class="role-badge" style="font-size:0.7rem;">' + (d.total_users || 0) + '</span></td>' +
                    '<td>' + formatDate(d.created_at) + '</td>' +
                    '<td>' +
                        '<button class="btn btn-sm btn-primary" onclick="showSetHead(' + d.id + ',\'' + d.name + '\')" style="margin-right:4px;">Set Head</button>' +
                        '<button class="btn btn-sm btn-danger" onclick="deleteDept(' + d.id + ',\'' + d.name + '\')">Delete</button>' +
                    '</td>';
                tb.appendChild(tr);
            });

            if (!allDepartments.length) {
                tb.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#aaa;">No departments</td></tr>';
            }
        }

        function showCreateUser() { document.getElementById('createUserModal').style.display = 'flex'; }
        function showCreateDept() { showCreateDeptPopulated(); }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function showChangeRole(userId, username, currentRole) {
            document.getElementById('changeRoleUserId').value = userId;
            document.getElementById('changeRoleUser').textContent = 'User: ' + username + ' (current: ' + currentRole + ')';
            document.getElementById('changeRoleSelect').value = currentRole;
            document.getElementById('changeRoleModal').style.display = 'flex';
        }

        async function createUser() {
            var errEl = document.getElementById('createUserError');
            errEl.style.display = 'none';

            var result = await postJSON('/api/mapping/users/create', {
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                email: document.getElementById('newEmail').value,
                role: document.getElementById('newRole').value,
                department: document.getElementById('newDepartment').value
            });

            if (result.success) {
                hideModal('createUserModal');
                loadUsers();
            } else {
                errEl.textContent = result.message;
                errEl.style.display = 'block';
            }
        }

        async function deleteUser(id, name) {
            if (!confirm('Delete user "' + name + '"? This cannot be undone.')) return;
            var result = await postJSON('/api/mapping/users/delete', { userId: id });
            alert(result.message);
            loadUsers();
        }

        async function suspendUser(id) {
            var result = await postJSON('/api/mapping/users/suspend', { userId: id });
            alert(result.message);
            loadUsers();
        }

        async function blockUser(id) {
            if (!confirm('Block this user?')) return;
            var result = await postJSON('/api/mapping/users/block', { userId: id });
            alert(result.message);
            loadUsers();
        }

        async function activateUser(id) {
            var result = await postJSON('/api/mapping/users/activate', { userId: id });
            alert(result.message);
            loadUsers();
        }

        async function changeRole() {
            var userId = document.getElementById('changeRoleUserId').value;
            var newRole = document.getElementById('changeRoleSelect').value;
            var result = await postJSON('/api/mapping/users/change-role', { userId: parseInt(userId), newRole: newRole });
            alert(result.message);
            hideModal('changeRoleModal');
            loadUsers();
        }

        async function createDept() {
            var errEl = document.getElementById('createDeptError');
            errEl.style.display = 'none';

            var payload = {
                name: document.getElementById('newDeptName').value
            };
            var headVal = document.getElementById('newDeptHead').value;
            if (headVal) payload.head_user_id = parseInt(headVal);

            var result = await postJSON('/api/mapping/departments/create', payload);

            if (result.success) {
                hideModal('createDeptModal');
                loadDepartments();
            } else {
                errEl.textContent = result.message;
                errEl.style.display = 'block';
            }
        }

        async function deleteDept(id, name) {
            if (!confirm('Delete department "' + name + '"?')) return;
            var result = await postJSON('/api/mapping/departments/delete', { departmentId: id });
            alert(result.message);
            loadDepartments();
        }

        async function showSetHead(deptId, deptName) {
            document.getElementById('setHeadDeptId').value = deptId;
            document.getElementById('setHeadDeptName').textContent = 'Department: ' + deptName;

            // populate dropdown with all users
            var users = await (await fetch('/api/mapping/users')).json();
            var sel = document.getElementById('setHeadSelect');
            sel.innerHTML = '<option value="">-- None --</option>';
            users.forEach(function (u) {
                var opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.username + ' (' + u.role + ')';
                sel.appendChild(opt);
            });

            // pre-select current head if set
            var dept = allDepartments.find(function (d) { return d.id === deptId; });
            if (dept && dept.head_user_id) sel.value = dept.head_user_id;

            document.getElementById('setHeadModal').style.display = 'flex';
        }

        async function setDeptHead() {
            var deptId = parseInt(document.getElementById('setHeadDeptId').value);
            var headUserId = document.getElementById('setHeadSelect').value;

            var result = await postJSON('/api/mapping/departments/update-head', {
                departmentId: deptId,
                head_user_id: headUserId || null
            });

            alert(result.message);
            hideModal('setHeadModal');
            loadDepartments();
        }

        function showCreateDeptPopulated() {
            // populate head dropdown when opening create modal
            fetch('/api/mapping/users').then(function(r) { return r.json(); }).then(function(users) {
                var sel = document.getElementById('newDeptHead');
                sel.innerHTML = '<option value="">-- None --</option>';
                users.forEach(function(u) {
                    var opt = document.createElement('option');
                    opt.value = u.id;
                    opt.textContent = u.username + ' (' + u.role + ')';
                    sel.appendChild(opt);
                });
            });
            document.getElementById('createDeptModal').style.display = 'flex';
        }

        function showResetPassword(userId, username) {
            document.getElementById('resetPasswordUserId').value = userId;
            document.getElementById('resetPasswordUser').textContent = 'Reset password for: ' + username;
            document.getElementById('resetNewPassword').value = '';
            document.getElementById('resetConfirmPassword').value = '';
            document.getElementById('resetPasswordError').style.display = 'none';
            document.getElementById('resetPasswordModal').style.display = 'flex';
        }

        async function resetPassword() {
            var errEl = document.getElementById('resetPasswordError');
            errEl.style.display = 'none';

            var newPwd = document.getElementById('resetNewPassword').value;
            var confirmPwd = document.getElementById('resetConfirmPassword').value;

            if (newPwd !== confirmPwd) {
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            var userId = document.getElementById('resetPasswordUserId').value;
            var result = await postJSON('/api/profile/' + userId + '/change-password', { newPassword: newPwd });

            if (result.success) {
                hideModal('resetPasswordModal');
                alert(result.message);
            } else {
                errEl.textContent = result.message;
                errEl.style.display = 'block';
            }
        }

        async function showEditUser(userId) {
            // fetch user details
            var users = await (await fetch('/api/mapping/users')).json();
            var user = null;
            for (var i = 0; i < users.length; i++) {
                if (users[i].id === userId) { user = users[i]; break; }
            }
            if (!user) return alert('User not found.');

            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editRole').value = user.role;

            // populate department dropdown
            var deptSelect = document.getElementById('editDepartment');
            deptSelect.innerHTML = '';
            allDepartments.forEach(function (d) {
                var opt = document.createElement('option');
                opt.value = d.name;
                opt.textContent = d.name;
                deptSelect.appendChild(opt);
            });
            deptSelect.value = user.department || '';

            document.getElementById('editUserError').style.display = 'none';
            document.getElementById('editUserModal').style.display = 'flex';
        }

        async function editUser() {
            var errEl = document.getElementById('editUserError');
            errEl.style.display = 'none';

            var userId = parseInt(document.getElementById('editUserId').value);
            var result = await postJSON('/api/mapping/users/edit', {
                userId: userId,
                username: document.getElementById('editUsername').value,
                email: document.getElementById('editEmail').value,
                role: document.getElementById('editRole').value,
                department: document.getElementById('editDepartment').value
            });

            if (result.success) {
                hideModal('editUserModal');
                alert(result.message);
                loadUsers();
            } else {
                errEl.textContent = result.message;
                errEl.style.display = 'block';
            }
        }

        init();
    </script>
</body>

</html>
