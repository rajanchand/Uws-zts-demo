<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ZTS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <a href="/dashboard" class="navbar-brand"><span>ZTS</span> Zero Trust Security</a>
        <div class="nav-menu" id="mainNav"></div>
        <div class="user-menu" id="userMenu"></div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header-row" style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                <h3 style="margin:0;">My Profile</h3>
                <span class="role-badge" id="profileRole"></span>
            </div>

            <div class="profile-fields-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="profileUsername" disabled>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="profileDepartment" disabled>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profileName" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="profilePhone" placeholder="Your phone number">
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label>Email Address</label>
                    <input type="email" id="profileEmail" placeholder="Your email address">
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
                <span id="profileMsg" class="form-status-msg"></span>
            </div>

            <p class="meta-text">
                Status: <span id="profileStatus"></span> &nbsp;|&nbsp; Member since: <span id="profileCreated"></span>
            </p>
        </div>

        <div class="card">
            <h3 style="margin-bottom:16px;">Change Password</h3>
            <div style="max-width:400px;">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 6 characters)">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password">
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-primary" onclick="changePassword()">Change Password</button>
                    <span id="passwordMsg" style="font-size:0.82rem; line-height:30px;"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function init() {
            var s = await (await fetch('/api/session')).json();
            if (!s.loggedIn) return location.href = '/login';
            buildNavbar(s.user.role, 'profile', s.user.username, s.user.permissions);

            var profile = await (await fetch('/api/profile')).json();
            document.getElementById('profileUsername').value = profile.username || '';
            document.getElementById('profileDepartment').value = profile.department || '';
            document.getElementById('profileName').value = profile.name || '';
            document.getElementById('profilePhone').value = profile.phone || '';
            document.getElementById('profileEmail').value = profile.email || '';
            document.getElementById('profileRole').textContent = profile.role;
            document.getElementById('profileStatus').textContent = profile.status;
            document.getElementById('profileCreated').textContent = formatDate(profile.created_at);
        }

        async function saveProfile() {
            var msg = document.getElementById('profileMsg');
            msg.textContent = '';

            var result = await postJSON('/api/profile/update', {
                name: document.getElementById('profileName').value,
                phone: document.getElementById('profilePhone').value,
                email: document.getElementById('profileEmail').value
            });

            msg.textContent = result.message;
            msg.style.color = result.success ? '#27ae60' : '#e74c3c';
        }

        async function changePassword() {
            var msg = document.getElementById('passwordMsg');
            msg.textContent = '';

            var newPwd = document.getElementById('newPassword').value;
            var confirmPwd = document.getElementById('confirmPassword').value;

            if (newPwd !== confirmPwd) {
                msg.textContent = 'Passwords do not match.';
                msg.style.color = '#e74c3c';
                return;
            }

            var result = await postJSON('/api/profile/change-password', {
                currentPassword: document.getElementById('currentPassword').value,
                newPassword: newPwd
            });

            msg.textContent = result.message;
            msg.style.color = result.success ? '#27ae60' : '#e74c3c';

            if (result.success) {
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
        }

        init();
    </script>
</body>

</html>
