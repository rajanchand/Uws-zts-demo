<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZTS Zero Trust Security</title>
    <link rel="stylesheet" href="/css/style.css?v=6">
    <style>
        .off-hours-banner {
            display: none;
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border: 1.5px solid #f39c12;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
            text-align: left;
        }
        .off-hours-banner .banner-title {
            font-weight: 700;
            color: #d35400;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .off-hours-banner .banner-body {
            font-size: 0.8rem;
            color: #7f4f00;
            line-height: 1.5;
        }
        .off-hours-banner .banner-policy {
            margin-top: 8px;
            font-size: 0.75rem;
            color: #a04000;
            border-top: 1px solid #f39c1240;
            padding-top: 6px;
        }
        .current-time-badge {
            display: inline-block;
            background: #d35400;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.03em;
        }
        .risk-pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .risk-pill.high   { background: #fadbd8; color: #c0392b; }
        .risk-pill.medium { background: #fdebd0; color: #d35400; }
        .risk-pill.low    { background: #eafaf1; color: #27ae60; }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Zero Trust Security in Remote work</h1>
            <h2>Welcome to Zero Trust Security</h2>

            <!-- Off-hours warning banner (shown dynamically) -->
            <div class="off-hours-banner" id="offHoursBanner">
                <div class="banner-title">
                    ⚠️ Off-Hours Access Detected
                </div>
                <div class="banner-body" id="offHoursBody"></div>
                <div class="banner-policy">
                    📋 ZTS Policy: Working hours are <strong>08:00 – 18:00 BST</strong>.
                    Off-hours logins require OTP verification and carry a higher risk score per NIST SP 800-207.
                </div>
            </div>

            <form id="loginForm">
                <input type="hidden" id="fingerprint" name="fingerprint">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="signInBtn">Sign In</button>
            </form>

            <p id="errorMsg" class="error-msg" style="display:none;"></p>
        </div>
    </div>

    <script src="/js/app.js?v=5"></script>
    <script>
        document.getElementById('fingerprint').value = getFingerprint();

        // Handle error messages from URL redirects
        var urlParams = new URLSearchParams(window.location.search);
        var msg = urlParams.get('msg');
        if (msg) {
            var errorEl = document.getElementById('errorMsg');
            if (msg === 'off_hours') {
                errorEl.innerHTML = '<strong>Access Denied:</strong> Remote work access restricted during off-hours (after 18:00 BST).';
            } else if (msg === 'session_invalid') {
                errorEl.innerHTML = '<strong>Session Invalidated:</strong> Safety mismatch detected.';
            } else if (msg === 'account_blocked') {
                errorEl.innerHTML = '<strong>Account Blocked:</strong> Your account has been blocked. Contact your administrator.';
            } else if (msg === 'session_expired') {
                errorEl.style.display = 'none';
            } else {
                errorEl.textContent = msg.replace(/_/g, ' ');
            }
            errorEl.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var errorEl    = document.getElementById('errorMsg');
            var banner     = document.getElementById('offHoursBanner');
            var bannerBody = document.getElementById('offHoursBody');
            var signInBtn  = document.getElementById('signInBtn');

            errorEl.style.display = 'none';
            banner.style.display  = 'none';
            signInBtn.disabled    = true;
            signInBtn.textContent = 'Signing in...';

            var data = {
                username:    document.getElementById('username').value.trim(),
                password:    document.getElementById('password').value,
                fingerprint: document.getElementById('fingerprint').value
            };

            try {
                var result = await postJSON('/login', data);

                if (result.success) {
                    // Store risk info before redirect
                    sessionStorage.setItem('riskScore', result.risk.score);
                    sessionStorage.setItem('riskLevel', result.risk.level);

                    // Off-hours detected: show warning, then redirect to OTP
                    if (result.offHours) {
                        sessionStorage.setItem('isOffHours', '1');
                        sessionStorage.setItem('offHoursMessage', result.offHoursMessage || '');

                        var level = (result.risk.level || 'High').toLowerCase();
                        bannerBody.innerHTML =
                            '<strong>' + (result.offHoursMessage || 'You are logging in outside working hours.') + '</strong>' +
                            '<br><br>Risk Level: <span class="risk-pill ' + level + '">' + result.risk.level + ' (' + result.risk.score + '/100)</span>' +
                            ' &nbsp;An OTP has been sent to your registered email.';

                        banner.style.display = 'block';

                        // Small delay so user reads the warning, then redirect
                        setTimeout(function () {
                            window.location.href = result.redirect;
                        }, 3500);

                        signInBtn.textContent = 'Redirecting to OTP...';
                        return;
                    }

                    window.location.href = result.redirect;
                } else {
                    errorEl.textContent = result.message;
                    errorEl.style.display = 'block';
                    signInBtn.disabled    = false;
                    signInBtn.textContent = 'Sign In';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
                signInBtn.disabled    = false;
                signInBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
