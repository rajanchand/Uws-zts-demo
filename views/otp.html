<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - ZTS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>ZTS</h1>
            <h2>Multi-Factor Authentication</h2>

            <p style="font-size:0.875rem; color:#64748b; margin-bottom:16px;">
                Enter the 6-digit code sent to your email
            </p>

            <div class="otp-display">
                <p style="font-size:0.85rem; color:#475569; margin:0 0 4px;">📧 OTP sent to your registered email</p>
                <p class="note">Check your inbox. Code expires in 5 minutes.</p>
            </div>

            <p id="riskInfo" style="font-size:0.82rem; margin-bottom:16px;"></p>

            <form id="otpForm">
                <div class="form-group">
                    <label for="otpInput">Enter OTP Code</label>
                    <input type="text" id="otpInput" name="code" maxlength="6" required
                        autocomplete="one-time-code"
                        style="text-align:center; font-size:1.5rem; letter-spacing:8px; font-weight: 600;">
                </div>
                <button type="submit" class="btn btn-primary">Verify & Sign In</button>
            </form>

            <p id="errorMsg" class="error-msg" style="display:none;"></p>

            <a href="/login" style="font-size:0.8rem; color:#0984e3; display:block; margin-top:16px;">
                Back to Login
            </a>
        </div>
    </div>

    <script src="/js/app.js?v=4"></script>
    <script>
        var riskScore = sessionStorage.getItem('riskScore') || '0';
        var riskLevel = sessionStorage.getItem('riskLevel') || 'Low';
        var riskColor = riskLevel === 'Low' ? 'score-low' : riskLevel === 'Medium' ? 'score-medium' : 'score-high';
        document.getElementById('riskInfo').innerHTML = 'Session Risk: <span class="' + riskColor + '" style="font-weight: 600;">' + riskLevel + ' (' + riskScore + '/100)</span>';

        document.getElementById('otpForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';

            var code = document.getElementById('otpInput').value.trim();
            if (!code) return;

            try {
                var result = await postJSON('/verify-otp', { code: code });

                if (result.success) {
                    // clear risk score from session storage
                    sessionStorage.removeItem('riskScore');
                    sessionStorage.removeItem('riskLevel');
                    // navigate to dashboard
                    window.location.href = result.redirect || '/dashboard';
                } else {
                    errorEl.textContent = result.message || 'Invalid code. Please try again.';
                    errorEl.style.display = 'block';
                    // clear the input so user can retype
                    document.getElementById('otpInput').value = '';
                    document.getElementById('otpInput').focus();
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>

</html>
